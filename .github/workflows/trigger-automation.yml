name: Deploy and Trigger Automation

on:
  push:
    branches:
      - main

jobs:

  deploy-website:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Static Website
        run: echo "Website deployed successfully"

  trigger-automation:
    needs: deploy-website

    runs-on: ubuntu-latest

    steps:

      - name: Trigger Automation Repository
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: token ${{ secrets.AUTOMATION_TOKEN }}" \
          https://api.github.com/repos/Priya7781/Playwright-Automation/dispatches \
          -d '{"event_type":"run-playwright-tests"}'