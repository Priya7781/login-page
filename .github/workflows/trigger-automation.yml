name: Trigger Playwright Automation

on:
  push:
    branches:
      - main

jobs:
  trigger-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Automation Repository
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: token ${{ secrets.AUTOMATION_TOKEN }}" \
          https://api.github.com/repos/Priya7781/Playwright-Automation/dispatches \
          -d '{"event_type":"run-playwright-tests"}'